name: Deploy React App to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Deploy via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          rsync -avz --delete \
            -e "ssh -i private_key.pem -o StrictHostKeyChecking=no" \
            ./dist/ ${EC2_USERNAME}@${EC2_HOST}:/tmp/site/

          ssh -i private_key.pem -o StrictHostKeyChecking=no \
            ${EC2_USERNAME}@${EC2_HOST} << 'EOF'

            echo "Deploying to /var/www/client.eapply.site"

            sudo rsync -av --delete /tmp/site/ /var/www/client.eapply.site/

            sudo chown -R www-data:www-data /var/www/client.eapply.site
            sudo chmod -R 755 /var/www/client.eapply.site

            rm -rf /tmp/site

            echo "✅ Deployment complete"
          EOF

          rm private_key.pem